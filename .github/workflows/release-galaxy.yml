---
name: Ansible Galaxy
on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published

jobs:
  galaxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Trigger a new import on Galaxy.
        run: uv tool run --python 3.13 --from ansible-core ansible-galaxy role import --api-key ${{ secrets.GALAXY_API_KEY }} $(echo ${{ github.repository }} | cut -d/ -f1) $(echo ${{ github.repository }} | cut -d/ -f2)
